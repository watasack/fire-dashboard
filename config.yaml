        food_out: 280000                # 外食: 月2.3万円 ※2025年実績28万
        transport_other: 240000         # 交通費（その他）: 月2万円（レジャー移動、家計調査水準）
        clothing: 110000                # 被服費: 月9,167円 ※2025年実績11万
        entertainment_movies: 20000     # 映画等: 月1,667円 ※2025年実績2万
        entertainment_other: 20000      # 娯楽（遊園地等）: 月1,667円 ※2025年実績2万
