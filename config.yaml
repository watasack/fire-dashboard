# FIRE Dashboard Configuration

# データソース設定
data:
  encoding: 'cp932'
  asset_file: 'data/資産推移月次.csv'
  transaction_pattern: 'data/収入・支出詳細_*.csv'

  # 収入予測設定（将来シミュレーションで使用する収入の条件）
  income_forecast:
    # 予測に含める収入のキーワード（部分一致）
    include_keywords:
      - '給与'
      - '給料'
      - 'マイナビ'  # 給与振込の識別子
    # 予測から除外する収入のキーワード（部分一致）
    exclude_keywords:
      - '財形'
      - '配当'
      - 'アマゾン'  # 一時所得
      - 'ポイント'
      - '還付'

# シミュレーション設定
simulation:
  years: 50                    # シミュレーション期間（年）
  start_age: 35                # 現在の年齢（オプション）
  life_expectancy: 90          # 想定寿命
  # 労働収入（夫婦別設定）
  husband_income: 465875  # 夫の手取り月額（円）: 年収7,507,388→社保・税引後
  wife_income: 450000  # 妻の手取り月額（円）: 個人事業主の想定手取り
  initial_labor_income: 965875 # 世帯手取り合計（husband_income + wife_income）
  # FIRE後収入（固定額モデル）
  # FIRE後は年金受給開始まで（またはside_fire_untilまで）、設定した固定額の収入を得る。
  husband_post_fire_income: 100000               # 夫のFIRE後副収入（月額・円）: 開発業務など
  wife_post_fire_income: 200000              # 妻のFIRE後月収（個人事業を縮小して継続）
  husband_side_fire_until: 65                    # 夫の副収入終了年齢（この年齢になったら0）
  wife_side_fire_until: 65                       # 妻の副収入終了年齢（この年齢になったら0）

  # 産休・育休による収入変動
  # 妻（個人事業主のため育休給付金なし → 期間中は0円）
  maternity_leave:
    - child: '楓'              # education.children の name と一致させる
      months_before: 2         # 産前2ヶ月前から
      months_after: 12         # 産後12ヶ月まで（計14ヶ月）
      monthly_income: 0        # 期間中の妻の月収

  # 夫の育休（会社員のため育児休業給付金あり）
  # 給付金: 最初の180日は67%、以降は50%（上限あり）
  husband_parental_leave:
    - child: '楓'              # education.children の name と一致させる
      months_after: 12         # 産後12ヶ月間取得
      monthly_income: 310000   # 育児休業給付金（手取り相当）: 最初6ヶ月は上限約31万円/月（非課税）
      monthly_income_after_180days: 231000  # 181日目以降: 50%相当、上限約23万円/月（非課税）

  # 夫の時短勤務（育休復帰後）
  # 育児短時間勤務制度: 子が3歳まで利用可能（育児・介護休業法）
  # 6時間勤務/8時間 = 給与75%
  husband_reduced_hours:
    - child: '楓'
      start_months_after: 12   # 育休復帰（産後12ヶ月後）から開始
      end_months_after: 36     # 子が3歳まで（法定上限）
      income_ratio: 0.75       # 通常給与の75%（6時間/8時間）

  # 標準シナリオ
  standard:
    annual_return_rate: 0.05   # 年率リターン 5%
    inflation_rate: 0.02       # インフレ率 2%
    income_growth_rate: 0.02   # 収入成長率 2%
    expense_growth_rate: 0.02  # 支出成長率 2%（インフレ連動）
    pension_growth_rate: 0.01  # 年金成長率 1%（マクロ経済スライド相当）

  # モンテカルロシミュレーション設定
  monte_carlo:
    enabled: true              # モンテカルロシミュレーションを有効化
    iterations: 1000           # シミュレーション回数（1000回以上推奨）
    return_std_dev: 0.06       # 年率リターンの標準偏差（6% = 長期平均回帰を考慮）
    mean_reversion_speed: 0.3  # 平均回帰の速度（0.0-1.0、0.3が推奨値）
                               # 0.0=回帰なし、0.3=現実的、0.5=中程度、1.0=完全回帰
    # 拡張モデル（GARCH + 非対称多期間平均回帰）
    enhanced_model:
      enabled: true            # 拡張モデルを有効化（ユーザー受け入れテスト）

      # ボラティリティ・クラスタリング（GARCH(1,1)パラメータ）
      # 較正済み: 分布拡大を最大化（目標: P90-P10範囲 +20-30%）
      garch_omega: 0.000025    # 基底ボラティリティ（分散）※最終較正: →0.000025
      garch_alpha: 0.35        # ショック持続性（ARCH効果）※最終較正: →0.35
      garch_beta: 0.60         # ボラティリティ持続性（GARCH効果）※最終較正: →0.60
      volatility_floor: 0.008  # 最小月次ボラティリティ（年2.8%相当）
      volatility_ceiling: 0.040  # 最大月次ボラティリティ（年14%相当、パニック時）※較正: 0.035→0.040

      # 多期間平均回帰（非対称回復モデル）
      mean_reversion_window: 12  # 累積リターンのルックバック期間（月）
      mr_speed_crash: 0.08     # 暴落後の回復速度（遅い、5年かけて回復）※最終較正: →0.08
      mr_speed_normal: 0.15    # 通常時の平均回帰速度 ※最終較正: →0.15
      mr_speed_bubble: 0.06    # バブル崩壊後の収縮速度（最も遅い）※最終較正: →0.06
      crash_threshold: -0.15   # 年率-15%で「暴落」と判定
      bubble_threshold: 0.15   # 年率+15%で「バブル」と判定

  # 取り崩し戦略設定（FIRE後）
  withdrawal_strategy: "fixed"   # "fixed" | "percentage" | "guardrail"
  withdrawal_rate: 0.04          # 定率モード用: 残高の何%を年間で取り崩すか（4%ルール）
  guardrail_lower: 0.80          # ガードレール下限（FIRE時資産に対する比率）
  guardrail_upper: 1.20          # ガードレール上限（FIRE時資産に対する比率）
  guardrail_reduction: 0.10      # 下限割れ時の生活費削減率（10% = 生活費を10%削減）

# FIRE設定
fire:
  # ==========================================
  # カテゴリ別予算管理（詳細版）
  # ==========================================
  # 基本生活費を23カテゴリに細分化して管理
  # 各カテゴリは基礎生活費/裁量的支出に分類され、暴落時の削減ロジックに使用されます
  expense_categories:
    enabled: true  # true: カテゴリ別予算を使用、false: 従来の総額方式を使用

    # カテゴリ定義（23カテゴリ）
    definitions:
      # ========== 基礎生活費（削減対象外） ==========
      - id: food_home
        name: '食費（自炊）'
        discretionary: false
        description: '家での食事、食材費、調味料'

      - id: utilities_electricity
        name: '光熱費（電気）'
        discretionary: false
        description: '電気代'

      - id: utilities_gas
        name: '光熱費（ガス）'
        discretionary: false
        description: 'ガス代（都市ガス/プロパン）'

      - id: utilities_water
        name: '光熱費（水道）'
        discretionary: false
        description: '上下水道代'

      - id: communication_mobile
        name: '通信費（携帯）'
        discretionary: false
        description: '携帯電話・スマートフォン'

      - id: communication_internet
        name: '通信費（インターネット）'
        discretionary: false
        description: '光回線・Wi-Fi'

      - id: transport_commute
        name: '交通費（定期券）'
        discretionary: false
        description: '通勤・通学定期券（FIRE後は基本0円）'

      - id: insurance_life
        name: '保険（生命）'
        discretionary: false
        description: '生命保険・医療保険・がん保険'

      - id: insurance_casualty
        name: '保険（損害）'
        discretionary: false
        description: '火災保険・地震保険・自動車保険'

      - id: medical
        name: '医療費'
        discretionary: false
        description: '病院・薬代・健康診断'

      - id: household_goods
        name: '日用品'
        discretionary: false
        description: 'トイレットペーパー・洗剤・おむつ等'

      # ========== 裁量的支出（削減対象） ==========
      - id: food_out
        name: '食費（外食）'
        discretionary: true
        description: '外食・デリバリー・テイクアウト'

      - id: transport_other
        name: '交通費（その他）'
        discretionary: true
        description: 'レジャー時の交通費・タクシー等'

      - id: clothing
        name: '被服費'
        discretionary: true
        description: '衣類・靴・バッグ等'

      - id: entertainment_movies
        name: '娯楽（映画/コンサート）'
        discretionary: true
        description: '映画・コンサート・演劇・スポーツ観戦'

      - id: entertainment_other
        name: '娯楽（その他）'
        discretionary: true
        description: 'カラオケ・ゲーム・アミューズメント施設'

      - id: travel
        name: '旅行'
        discretionary: true
        description: '国内旅行・海外旅行・温泉・帰省'

      - id: hobby
        name: '趣味'
        discretionary: true
        description: '趣味用品・写真・音楽・スポーツ用品'

      - id: education_books
        name: '教養（書籍）'
        discretionary: true
        description: '書籍・雑誌・新聞'

      - id: education_courses
        name: '教養（講座）'
        discretionary: true
        description: 'オンライン講座・資格取得・習い事'

      - id: beauty
        name: '美容・理容'
        discretionary: true
        description: '美容院・理容院・化粧品・エステ'

      - id: other
        name: 'その他'
        discretionary: true
        description: '上記に分類されない支出'

    # ライフステージ別の予算配分（年額・円）
    # 各ステージの合計は base_expense_by_stage と一致するよう設計
    budgets_by_stage:
