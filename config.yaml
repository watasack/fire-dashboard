  # ==========================================
  # ライフステージ別合計値（シミュレーション計算用）
  # ==========================================
  # expense_categories の合計値と一致させること（シミュレーションで直接参照）
  # ライフステージ別の基本生活費（教育費・住宅ローン・住宅メンテナンスを除く）
  # 子供の年齢に応じて自動的に切り替わります
  # 家計調査2024年平均（二人以上世帯）から住居費・教育費を除き、
  # 車なし世帯の交通費差分（約▲30万円/年）を反映した値
  base_expense_by_stage:
    young_child: 2675000    # 子供が0-5歳（未就学）: 268万円/年（医療費・損害保険・日用品・交通費補正後）
    elementary: 2941000     # 子供が6-11歳（小学生）: 294万円/年（同上・外食・その他削減後）
    junior_high: 3150000    # 子供が12-14歳（中学生）: 315万円/年（同上・外食・その他削減後）
    high_school: 3335000    # 子供が15-17歳（高校生）: 334万円/年（同上・その他削減後）
    university: 3369000     # 子供が18-21歳（大学生）: 337万円/年（同上・その他削減後）
    empty_nest: 2581000          # 子供独立後フォールバック: 258万円/年（家計調査2023ベース）
    empty_nest_active: 2581000   # 子供独立後・アクティブ期（親〜69歳）: 258万円/年
    empty_nest_senior: 2243000   # 子供独立後・シニア期（親70〜79歳）: 224万円/年
    empty_nest_elderly: 1931000  # 子供独立後・高齢期（親80歳〜）: 193万円/年

  # 裁量的支出の比率（ライフステージ別、シミュレーション計算用）
  # 基本生活費のうち、暴落時に削減可能な支出の割合（expense_categories の discretionary 合計 / 全体合計）
  # 裁量的支出: 旅行、娯楽、外食、ワーケーション等
  # 基礎生活費: 食費（基本）、光熱費、保険、住宅ローン等
  discretionary_ratio_by_stage:
    young_child: 0.44      # 44%（医療費・損害保険を非裁量として追加）
    elementary: 0.47       # 47%（外食・その他削減）
    junior_high: 0.47      # 47%（外食・その他削減）
    high_school: 0.46      # 46%（その他削減）
    university: 0.45       # 45%（その他削減）
    empty_nest: 0.43           # 43%（フォールバック: 家計調査ベース・保険・医療が非裁量として増加）
    empty_nest_active: 0.43    # 43%（アクティブ期）
    empty_nest_senior: 0.39    # 39%（シニア期: 医療費増により非裁量比率がさらに上昇）
    empty_nest_elderly: 0.31   # 31%（高齢期: 医療費・介護費が中心）

  # 子供独立後サブステージの年齢境界
  empty_nest_sub_stages:
    senior_from_age: 70        # 70歳からシニア期
    elderly_from_age: 80       # 80歳から高齢期

  # 動的支出調整（比例制御型）
  # ベースライン資産との乖離に比例して支出を調整
  # 上ぶれ（余剰）→ 支出増加、下ぶれ（不足）→ 支出削減
  dynamic_expense_reduction:
    enabled: true
    surplus_spending_rate: 0.40  # 余剰/不足額の年率40%を支出調整に反映（α）
    max_cut_ratio: 0.7           # 裁量支出の最大70%まで削減可能（生活防衛）
    max_boost_ratio: 5.0         # 裁量支出の最大500%まで増加可能

  # 追加子供1人あたりの生活費増加（ステージ別・年額・円）
  # 第二子以降、各子供の年齢（ステージ）に応じた追加費用を加算
  # ベースは第一子のステージの世帯費用 + 各追加子供の年齢別増加分
  additional_child_expense_by_stage:
    young_child: 500000   # 0-5歳:  50万/年（食費増・おむつ・ベビー用品等）※保育園費はeducation.costs.nurseryで別途計上
    elementary:  400000   # 6-11歳: 40万/年（習い事・文房具・給食費・学童）
    junior_high: 450000   # 12-14歳: 45万/年（部活・制服・修学旅行）
    high_school: 450000   # 15-17歳: 45万/年（交通費・部活・受験費用）
    university:  600000   # 18-21歳: 60万/年（生活費・通学費・教材費）
    empty_nest:       0   # 22歳以降: 0円（独立後は家計への影響なし）

  # 最適化結果（optimize_pension.py が自動更新）
  # optimal_fire_month が設定されている場合、ダッシュボードはこの月でFIREしたものとしてMCを実行する
  # null の場合は従来通り最初にFIRE可能になった月を使用
  optimal_fire_month: 47       # 最適化結果: 月47、最終資産822万円
  optimal_extra_monthly_budget: 0  # 最適化結果: FIRE後追加月額予算

  # 固定支出（一律、データが不足している場合のフォールバック）
  manual_annual_expense: null  # nullの場合はライフステージ別を使用

