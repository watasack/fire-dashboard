  # 受給者情報（動的計算対応）
  # pension_type: 'employee' または 'national'
  #   - employee: 厚生年金 + 国民年金（会社員）
  #   - national: 国民年金のみ（自営業・専業主婦など）
  people:
    - name: '夫'
      birthdate: '1990/05/13'     # 生年月日（YYYY/MM/DD形式）
      pension_type: 'employee'    # 厚生年金 + 国民年金
      work_start_age: 21          # 加入開始年齢（177ヶ月実績から逆算: 35.8歳 - 14.75年）
      avg_monthly_salary: 625615  # 現在の標準報酬月額（円）- FIRE後将来分の計算用
      # 算出根拠: 年収7,507,388円（月固定556,000×12 + ボーナス417,694×2）/ 12ヶ月
      past_pension_base_annual: 236929   # ねんきん定期便: 老齢厚生年金実績額（円/年）
      past_contribution_months: 177      # ねんきん定期便: これまでの加入月数
      # 計算方式: 過去実績(236,929円) + 残り期間(625,615円 × 将来月数 × 0.005481)
      override_start_age: 74      # 最適化結果: 75歳繰下げ（+84.0%増額）
    - name: '妻'
      birthdate: '1991/04/20'     # 生年月日（YYYY/MM/DD形式）
      pension_type: 'national'    # 国民年金のみ
