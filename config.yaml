# 資産配分設定（現金・株の分離管理）
asset_allocation:
  enabled: true                # 資産配分機能を有効化

  # 現金管理
  cash_buffer_months: 6        # 生活費の何ヶ月分を現金で保持
  auto_invest_threshold: 1.5   # 現金バッファの何倍で自動投資開始

  # NISA設定
  nisa_enabled: true           # NISA投資を有効化
  nisa_annual_limit: 3600000   # 新NISA年間投資上限360万円（2024年〜）
  invest_beyond_nisa: true     # NISA枠超過後も課税口座で投資を継続（falseにするとNISA枠のみ）

  # 現金管理
  min_cash_balance: 5000000    # 最低限保持する現金残高（500万円、破綻ライン）

  # 税金設定
  capital_gains_tax_rate: 0.20315  # 譲渡益課税20.315%（所得税15.315% + 住民税5%）

# FIRE後の現金管理戦略（暴落時の底値売却回避）
post_fire_cash_strategy:
  enabled: true                # FIRE後の現金管理戦略を有効化

  # 基本設定
  safety_margin: 1000000       # 安全マージン: 100万円（シミュレーション打ち切り・最適化制約に使用）
  target_cash_reserve: 3000000 # 現金確保目標: 300万円（FIRE後の現金管理で常時確保する水準）
  monthly_buffer_months: 1     # 生活費バッファ: 1ヶ月分

  # 暴落時の株式売却停止ルール
  market_crash_threshold: -0.2    # ドローダウン-20%以下で暴落と判定
  recovery_threshold: -0.15        # ドローダウン-10%以上で回復と判定
  emergency_cash_floor: 100000     # 緊急時最低現金（25万円、これを下回ったら強制売却）


# 年金繰り下げ受給戦略
pension_deferral:
  enabled: true                # 年金繰り下げ戦略を有効化

  # 繰り下げ判定基準（資産ベース）
  # FIRE目標資産に対する現在資産の比率で判定
  defer_to_70_threshold: 1.50   # 資産が目標の150%以上なら70歳まで繰り下げ
  defer_to_68_threshold: 1.20   # 資産が目標の120%以上なら68歳まで繰り下げ
  early_at_62_threshold: 0.50   # 資産が目標の50%未満なら62歳から繰り上げ受給

  # 繰り下げ・繰り上げの効果（年率）
  # 繰り下げ: +8.4%/年（+0.7%/月 × 12ヶ月）
  # 繰り上げ: -4.8%/年（-0.4%/月 × 12ヶ月）※2022年4月改定後
  deferral_increase_rate: 0.084   # 1年繰り下げで+8.4%
  early_decrease_rate: 0.048      # 1年繰り上げで-4.8%

  # 最小・最大受給開始年齢
  min_start_age: 62            # 繰り上げ受給の下限
  max_start_age: 75            # 繰り下げ受給の上限（2022年4月から75歳まで可能）


# 最適化設定
optimization:
  pre_pension_reduction_rate: 0.3  # 最適化結果
  min_asset_floor: 3_000_000       # 途中の最小資産下限（円）
  austerity_years_before_pension: 10  # 年金受給前の緊縮期間（年）
  pre_pension_reduction_candidates: [0, 0.10, 0.20, 0.30]

# 可視化設定
visualization:
  font_family: "'Segoe UI', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Meiryo', sans-serif"

# 出力設定
output:
  html_file: 'dashboard/index.html'
